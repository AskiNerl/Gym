<!DOCTYPE html>
<html lang="ru">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
  <title>Трекер тренировок</title>
  <link rel="stylesheet" href="css/style.css">
</head>
<body>

<button class="settings-btn">&#9881;</button>

<div class="settings-menu" id="menu">
  <h3>Настройки</h3>
  <button onclick="toggleTheme()">🌙 / ☀️ Сменить тему</button>
  <div class="settings-auth" id="settingsAuth">
    <p class="auth-status" id="authStatus">Аккаунт: не подключен</p>
    <button type="button" class="auth-btn auth-login" id="googleLoginBtn">Войти через Google</button>
    <button type="button" class="auth-btn auth-switch" id="googleSwitchBtn" hidden>Сменить аккаунт</button>
    <button type="button" class="auth-btn auth-logout" id="googleLogoutBtn" hidden>Выйти</button>
  </div>
</div>

<div class="container">

  <h1>🏋️ Тренировки</h1>
<div class="calendar">

  <div class="calendar-header">
    <button class="calendar-nav" onclick="changeMonth(-1)" aria-label="Предыдущий месяц">&#8249;</button>
    <span id="monthLabel"></span>
    <button class="calendar-nav" onclick="changeMonth(1)" aria-label="Следующий месяц">&#8250;</button>
  </div>

  <div class="calendar-weekdays" id="calendarWeekdays"></div>
  <div class="calendar-grid" id="calendarGrid"></div>

</div>
 
  <div class="exercise-picker" id="exercisePicker">
    <button type="button" class="exercise-picker-toggle" id="exercisePickerToggle" aria-haspopup="listbox" aria-expanded="false"></button>
    <div class="exercise-picker-menu" id="exercisePickerMenu" hidden>
      <div class="exercise-picker-list" id="exercisePickerList" role="listbox"></div>
    </div>
  </div>

  <select id="exerciseSelect" hidden></select>

  <input type="text" id="newExercise" placeholder="Добавить своё упражнение">
  <button class="add-btn" onclick="addExercise()">Добавить упражнение</button>


  <input type="number" id="weight" placeholder="Вес (кг)">
  <div class="bodyweight-row" id="bodyweightRow" hidden>
    <label class="bodyweight-label">
      <input type="checkbox" id="bodyweightToggle">
      Свой вес
    </label>
  </div>
  <input type="number" id="sets" placeholder="Подходы">

  <button class="main-btn" onclick="addWorkout()">Сохранить</button>

  <ul id="list"></ul>
</div>

<div class="confirm-modal" id="confirmModal" hidden>
  <div class="confirm-backdrop" id="confirmBackdrop"></div>
  <div class="confirm-dialog" role="dialog" aria-modal="true" aria-labelledby="confirmTitle">
    <h3 id="confirmTitle">Удалить запись?</h3>
    <p id="confirmText"></p>
    <div class="confirm-actions">
      <button type="button" class="confirm-cancel" id="confirmCancel">Отмена</button>
      <button type="button" class="confirm-delete" id="confirmDelete">Удалить</button>
    </div>
  </div>
</div>

<div class="confirm-modal" id="noticeModal" hidden>
  <div class="confirm-backdrop" id="noticeBackdrop"></div>
  <div class="confirm-dialog notice-dialog" role="alertdialog" aria-modal="true" aria-labelledby="noticeTitle">
    <h3 id="noticeTitle">Ошибка</h3>
    <p id="noticeText"></p>
    <div class="confirm-actions">
      <button type="button" class="notice-ok" id="noticeOk">Понятно</button>
    </div>
  </div>
</div>

<div class="app-version">ALPHA 1.2 </div>

<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<script src="js/script.js"></script>
</body>
</html>
